<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1antix9 | Sovereign Core Initialization</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; items-center: center; height: 100vh; width: 100vw; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        
        /* Stake Signature Liquid Swipe Vector CSS Keyframes */
        .liquid-swipe-vector {
            width: 100px; height: 100px;
            border: 4px solid transparent;
            border-bottom: 4px solid #ffffff;
            border-radius: 50%;
            animation: liquidSweep 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.05);
        }
        @keyframes liquidSweep {
            0% { transform: rotate(0deg) scale(0.9); border-bottom-color: #ffffff; }
            50% { transform: rotate(180deg) scale(1.06); border-bottom-color: #cccccc; }
            100% { transform: rotate(360deg) scale(0.9); border-bottom-color: #ffffff; }
        }
        
        /* Particle Sparkle Embers Execution */
        .sparkle-particle {
            position: absolute; width: 3px; height: 3px; background-color: #ffffff;
            border-radius: 50%; box-shadow: 0 0 10px #ffffff; opacity: 0;
            animation: sparkleFly 0.7s ease-out infinite;
        }
        @keyframes sparkleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        
        .brand-reveal-text {
            opacity: 0; transform: translateY(10px);
            animation: textFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.6s;
        }
        @keyframes textFadeIn { 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col justify-center items-center relative select-none">

    <div class="relative flex flex-col items-center justify-center gap-6">
        <!-- Liquid Core Loading Element -->
        <div id="loader-node" class="liquid-swipe-vector flex items-center justify-center"></div>
        
        <!-- Animated Sparkling Array Spawner Container -->
        <div id="sparkle-canvas-wrapper" class="absolute inset-0 pointer-events-none"></div>

        
        <h1 class="brand-reveal-text text-2xl font-black font-cyber tracking-[0.3em] text-white lowercase">1antix9</h1>
    </div>

    <script>
        // Spawning dynamic tracking embers that vanish into distance coordinates
        const wrapper = document.getElementById('sparkle-canvas-wrapper');
        if(wrapper) {
            setInterval(() => {
                for(let i=0; i<3; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle-particle';
                    s.style.setProperty('--x', (Math.random() * 90 - 45) + 'px');
                    s.style.setProperty('--y', (Math.random() * 90 - 45) + 'px');
                    s.style.left = '50%'; s.style.top = '40%';
                    wrapper.appendChild(s);
                    setTimeout(() => s.remove(), 700);
                }
            }, 140);
        }

        // Autonomous Redirecting Trigger to the Premium Dashboard Core View
        window.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/service-worker.js').catch(() => {});
            }
            setTimeout(() => { 
                window.location.href = '/dashboard/index.html'; 
            }, 2000);
        });
    </script>
</body>
</html>
