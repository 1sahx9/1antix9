<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1antix9 | Sovereign Core Initialization</title>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .liquid-swipe-vector {
            width: 100px; height: 120px;
            border: 4px solid transparent;
            border-bottom: 4px solid #ffffff;
            border-radius: 50%;
            animation: liquidSweep 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
        }
        @keyframes liquidSweep {
            0% { transform: rotate(0deg) scale(0.9); border-bottom-color: #ffffff; }
            50% { transform: rotate(180deg) scale(1.05); border-bottom-color: #cccccc; }
            100% { transform: rotate(360deg) scale(0.9); border-bottom-color: #ffffff; }
        }
        .sparkle-particle {
            position: absolute; width: 3px; height: 3px; background-color: #ffffff;
            border-radius: 50%; box-shadow: 0 0 8px #ffffff; opacity: 0;
            animation: sparkleFly 0.7s ease-out infinite;
        }
        @keyframes sparkleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        .brand-reveal-text {
            color: #ffffff; font-family: monospace; font-size: 28px; font-weight: 900;
            letter-spacing: 0.3em; text-transform: lowercase; opacity: 0;
            transform: translateY(10px); animation: textFadeIn 0.5s ease-out forwards; animation-delay: 0.7s;
        }
        @keyframes textFadeIn { 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div style="display: flex; flex-col; flex-direction: column; align-items: center; gap: 24px;">
        <div id="loader-node" class="liquid-swipe-vector"></div>
        <div id="sparkle-canvas-wrapper" style="position: absolute; pointer-events: none;"></div>
        <h1 class="brand-reveal-text">1antix9</h1>
    </div>
    <script>
        try {
            const wrapper = document.getElementById('sparkle-canvas-wrapper');
            setInterval(() => {
                for(let i=0; i<3; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle-particle';
                    s.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
                    s.style.setProperty('--y', (Math.random() * 100 - 50) + 'px');
                    wrapper.appendChild(s);
                    setTimeout(() => s.remove(), 700);
                }
            }, 120);
            setTimeout(() => { window.location.href = '/dashboard/index.html'; }, 2000);
        } catch(e) { window.location.href = '/dashboard/index.html'; }
    </script>
</body>
</html>
