<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1antix9 | Sovereign Core Initialization</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        
        /* Premium Liquid Sweep Spinner Track */
        .liquid-swipe-vector {
            width: 130px; height: 120px;
            border: 4px solid transparent;
            border-bottom: 4px solid #ffffff;
            border-radius: 50%;
            animation: liquidSweep 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.04);
        }
        @keyframes liquidSweep {
            0% { transform: rotate(0deg) scale(0.92); border-bottom-color: #ffffff; }
            50% { transform: rotate(180deg) scale(1.06); border-bottom-color: #e5e5e7; }
            100% { transform: rotate(360deg) scale(0.92); border-bottom-color: #ffffff; }
        }
        
        /* Particle Sparkle Embers Layout */
        .sparkle-particle {
            position: absolute; width: 3px; height: 3px; background-color: #ffffff;
            border-radius: 50%; box-shadow: 0 0 12px #ffffff; opacity: 0;
            animation: sparkleFly 0.75s ease-out infinite;
        }
        @keyframes sparkleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        
        .brand-reveal-text {
            opacity: 0; transform: translateY(12px);
            animation: textFadeIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.75s;
        }
        @keyframes textFadeIn { 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="relative flex flex-col items-center justify-center gap-6">
        <!-- Liquid Core Loading Node -->
        <div id="loader-node" class="liquid-swipe-vector"></div>
        <!-- Sparkling Array Spawner Container -->
        <div id="sparkle-canvas-wrapper" class="absolute inset-0 pointer-events-none"></div>
        
        <h1 class="brand-reveal-text text-3xl font-black font-cyber tracking-[0.35em] text-white lowercase">1antix9</h1>
    </div>

    <script>
        // Spawning dynamic tracking embers that vanish into distance coordinates natively
        try {
            const wrapper = document.getElementById('sparkle-canvas-wrapper');
            setInterval(() => {
                for(let i=0; i<4; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle-particle';
                    s.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
                    s.style.setProperty('--y', (Math.random() * 100 - 50) + 'px');
                    s.style.left = '50%'; s.style.top = '45%';
                    wrapper.appendChild(s);
                    setTimeout(() => s.remove(), 750);
                }
            }, 140);
        } catch(e) { console.clear(); }

        // Seamless zero lag redirect handshake route initialization
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { window.location.href = '/dashboard/index.html'; }, 2000);
        });
    </script>
</body>
</html>
